<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp SKY-KID</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
body { background-color: #050508; color: #e0e0e6; padding: 30px 3px 20px 3px; }
h2, h3 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
h2 { color: #00f0ff; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); font-size: 1.4rem; }
h3 { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); font-size: 1.1rem; }
.class-stats { text-align: center; color: #ffd700; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
.class-panel { background: #0a0a14; border: 1px solid #00f0ff; border-radius: 6px; padding: 15px 8px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.15); }
.add-student-box { display: flex; flex-direction: column; gap: 10px; background: #0d0d1a; border: 1px solid #ffd700; border-radius: 4px; padding: 12px 10px; margin-bottom: 15px; }
.add-student-box input { width: 100%; background: #050508; border: 1px solid #333; color: #fff; padding: 12px 10px; font-size: 0.9rem; border-radius: 4px; outline: none; }
.btn-add { background: #ffd700; color: #000; border: none; padding: 12px; font-weight: bold; font-size: 0.9rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
.student-list { display: flex; flex-direction: column; gap: 10px; }
.student-card { background: #121224; border: 1px solid #333; border-left: 4px solid #00f0ff; border-radius: 4px; padding: 12px 10px; display: flex; flex-direction: column; gap: 10px; }
.student-info-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }
.student-meta { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.student-name { font-weight: bold; font-size: 0.95rem; color: #fff; }
.student-phone { font-size: 0.8rem; color: #888; }
.student-actions-right { display: flex; gap: 5px; }
.btn-call { background: #ffd700; color: #000; padding: 8px 12px; font-size: 0.9rem; border: none; border-radius: 4px; cursor: pointer; box-shadow: 0 0 5px #ffd700; }
.btn-delete { background: #4a0000; color: #ff3333; border: 1px solid #ff3333; padding: 8px 10px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; }
.student-controls-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
@media (min-width: 350px) { .student-controls-row { grid-template-columns: repeat(4, 1fr); } }
.note-select { background: #1a1a3a; color: #00f0ff; border: 1px solid #00f0ff; padding: 8px 2px; font-size: 0.75rem; border-radius: 3px; outline: none; width: 100%; text-align: center; }
.note-select.status-sel { color: #ffd700; border-color: #ffd700; }
</style>
</head>
<body>
<h2>Lớp: SKY-KID</h2>
<div class="class-stats" id="classStats">Sĩ số: 0</div>
<div class="class-panel">
<h3>Danh Sách: SKY-KID</h3>
<br>
<div class="add-student-box">
<input type="text" id="newStudentName" placeholder="Dòng 1: Nhập họ và tên...">
<input type="tel" id="newStudentPhone" placeholder="Dòng 2: Nhập số điện thoại...">
<button class="btn-add" onclick="addNewStudent()">+ Thêm vào danh sách</button>
</div>
<div class="student-list" id="studentList"></div>
</div>
<script>
const defaultStudents = [
    {
        "id": 1,
        "name": "Nguyễn An Nhiên (Bơ)",
        "phone": "0396963955",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 2,
        "name": "Nguyễn Trung Đức (Bon)",
        "phone": "0339804981",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 3,
        "name": "Đặng Đình Bách",
        "phone": "0904511462",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 4,
        "name": "Lâm Duy Anh",
        "phone": "0902239258",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 5,
        "name": "Vũ Nguyễn Hải Anh 23/11/2",
        "phone": "00336076895",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 6,
        "name": "Lan Anh em Tuấn Anh B",
        "phone": "Chưa có",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 7,
        "name": "Đặng Khánh Ngân",
        "phone": "0942093566",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 8,
        "name": "Trần Lê Tuệ Linh",
        "phone": "0988742202",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 9,
        "name": "Nguyễn Trâm Anh",
        "phone": "0919403848",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 10,
        "name": "Nguyễn Tú Anh",
        "phone": "0919403848",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 11,
        "name": "Nguyễn Hà My",
        "phone": "0943681990",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    },
    {
        "id": 12,
        "name": "Hoàng Ngọc Phương Linh",
        "phone": "0912731673",
        "grammar": "",
        "communication": "",
        "attitude": "",
        "progress": ""
    }
];
let myClass = { name: "SKY-KID", students: [] };
function displayPhone(p) { if(!p || p==='Chưa có') return 'Chưa có'; let c = p.replace(/\s+/g, ''); if(c.length===10) return c.substring(0,4)+' '+c.substring(4,7)+' '+c.substring(7); return p; }
function loadData() { const saved = localStorage.getItem('classData_SKY-KID_v4'); if(saved) { myClass.students = JSON.parse(saved); } else { myClass.students = defaultStudents; saveData(); } }
function saveData() { localStorage.setItem('classData_SKY-KID_v4', JSON.stringify(myClass.students)); }
window.onload = function() { loadData(); renderStudentList(); updateStats(); };
function updateStats() { document.getElementById('classStats').innerText = 'Sĩ số: ' + myClass.students.length; }
function addNewStudent() { const nameInput = document.getElementById('newStudentName'); const phoneInput = document.getElementById('newStudentPhone'); const name = nameInput.value.trim(); const phone = phoneInput.value.trim().replace(/\s+/g, '') || 'Chưa có'; if(name === '') { alert('Vui lòng nhập tên!'); return; } const nextId = myClass.students.length > 0 ? Math.max(...myClass.students.map(s => s.id)) + 1 : 1; myClass.students.push({ id: nextId, name: name, phone: phone, grammar: '', communication: '', attitude: '', progress: '' }); saveData(); nameInput.value = ''; phoneInput.value = ''; renderStudentList(); updateStats(); }
function deleteStudent(id, name) { if(confirm('Bạn có chắc chắn muốn XÓA học sinh ' + name + '?')) { myClass.students = myClass.students.filter(s => s.id !== id); myClass.students.forEach((s, idx) => { s.id = idx + 1; }); saveData(); renderStudentList(); updateStats(); } }
function renderStudentList() { const container = document.getElementById('studentList'); container.innerHTML = ''; myClass.students.forEach(student => { const card = document.createElement('div'); card.className = 'student-card'; card.innerHTML = '<div class="student-info-row"><div class="student-meta"><span class="student-name">' + student.id + '. ' + student.name + '</span><span class="student-phone">SĐT: ' + displayPhone(student.phone) + '</span></div><div class="student-actions-right"><button class="btn-call" onclick="callStudent(\'' + student.phone + '\')">📞</button><button class="btn-delete" onclick="deleteStudent(' + student.id + ', \'' + student.name + '\')">🗑️</button></div></div><div class="student-controls-row">' + 
    '<select class="note-select" onchange="updateField(' + student.id + ', \'grammar\', this.value)"><option value="">-- Ngữ pháp --</option><option value="Tốt" ' + (student.grammar==='Tốt'?'selected':'') + '>Ngữ pháp: Tốt</option><option value="Khá" ' + (student.grammar==='Khá'?'selected':'') + '>Ngữ pháp: Khá</option><option value="Trung bình" ' + (student.grammar==='Trung bình'?'selected':'') + '>Ngữ pháp: Trung bình</option><option value="Yếu" ' + (student.grammar==='Yếu'?'selected':'') + '>Ngữ pháp: Yếu</option></select>' + 
    '<select class="note-select" onchange="updateField(' + student.id + ', \'communication\', this.value)"><option value="">-- Giao tiếp --</option><option value="Tốt" ' + (student.communication==='Tốt'?'selected':'') + '>Giao tiếp: Tốt</option><option value="Khá" ' + (student.communication==='Khá'?'selected':'') + '>Giao tiếp: Khá</option><option value="Trung bình" ' + (student.communication==='Trung bình'?'selected':'') + '>Giao tiếp: Trung bình</option><option value="Yếu" ' + (student.communication==='Yếu'?'selected':'') + '>Giao tiếp: Yếu</option></select>' + 
    '<select class="note-select" onchange="updateField(' + student.id + ', \'attitude\', this.value)"><option value="">-- Ý thức --</option><option value="Tốt" ' + (student.attitude==='Tốt'?'selected':'') + '>Ý thức: Tốt</option><option value="Khá" ' + (student.attitude==='Khá'?'selected':'') + '>Ý thức: Khá</option><option value="Trung bình" ' + (student.attitude==='Trung bình'?'selected':'') + '>Ý thức: Trung bình</option><option value="Chưa tốt" ' + (student.attitude==='Chưa tốt'?'selected':'') + '>Ý thức: Chưa tốt</option></select>' + 
    '<select class="note-select status-sel" onchange="updateField(' + student.id + ', \'progress\', this.value)"><option value="">-- Tình trạng --</option><option value="Tiến bộ" ' + (student.progress==='Tiến bộ'?'selected':'') + '>📈 Tiến bộ</option><option value="Duy trì" ' + (student.progress==='Duy trì'?'selected':'') + '>➡️ Duy trì</option><option value="Cần cố gắng" ' + (student.progress==='Cần cố gắng'?'selected':'') + '>⚠️ Cần cố gắng</option><option value="Kém đi" ' + (student.progress==='Kém đi'?'selected':'') + '>📉 Kém đi</option></select>' + 
    '</div>'; container.appendChild(card); }); }
function updateField(id, field, value) { const student = myClass.students.find(s => s.id === id); student[field] = value; saveData(); }
function callStudent(phone) { if(phone === 'Chưa có') { alert('Chưa có SĐT!'); return; } window.location.href = 'tel:' + phone; }
</script>
</body>
</html>
